<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ConText Editor</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMic+PHJlY3Qgd2lkdGg9JzMyJyBoZWlnaHQ9JzMyJyByeD0nNycgZmlsbD0nIzdjNmNmMCcvPjxwYXRoIGQ9J00xMyA5bC01IDcgNSA3JyBmaWxsPSdub25lJyBzdHJva2U9JyNmZmZmZmYnIHN0cm9rZS13aWR0aD0nMi42JyBzdHJva2UtbGluZWNhcD0ncm91bmQnIHN0cm9rZS1saW5lam9pbj0ncm91bmQnLz48cGF0aCBkPSdNMTkgOWw1IDctNSA3JyBmaWxsPSdub25lJyBzdHJva2U9JyNmZmZmZmYnIHN0cm9rZS13aWR0aD0nMi42JyBzdHJva2UtbGluZWNhcD0ncm91bmQnIHN0cm9rZS1saW5lam9pbj0ncm91bmQnIG9wYWNpdHk9JzAuNTUnLz48L3N2Zz4="
    />
    <link rel="stylesheet" href="editor.css" />
    <script>
      // Apply the saved theme synchronously before first paint (no flash of the
      // wrong theme). "system" leaves data-theme unset so the CSS media query governs.
      (function () {
        try {
          var mode = localStorage.getItem("context-editor.theme");
          if (mode === "light" || mode === "dark") {
            document.documentElement.dataset.theme = mode;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 6l-4 6 4 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 6l4 6-4 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
            </svg>
          </span>
          <span class="brand-name">ConText Editor</span>
        </div>

        <div class="topbar-right">
          <div id="save-status" class="save-status" data-state="saved">Saved</div>
          <div id="theme-toggle" class="theme-toggle" role="group" aria-label="Theme">
            <button type="button" class="theme-opt" data-theme-value="system" title="Follow system theme" aria-label="System theme">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="3" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/>
                <path d="M8 20h8M12 16v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <button type="button" class="theme-opt" data-theme-value="light" title="Light theme" aria-label="Light theme">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <button type="button" class="theme-opt" data-theme-value="dark" title="Dark theme" aria-label="Dark theme">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M20 14.5A8 8 0 0 1 9.5 4a7 7 0 1 0 10.5 10.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <div id="body">
        <aside id="sidebar">
          <button id="new-snippet-btn" class="btn-new" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>New note</span>
          </button>
          <ul id="snippet-list" class="snippet-list"></ul>
        </aside>

        <main id="main">
          <div id="note-titlebar">
            <span id="note-title">Untitled</span>
            <div class="titlebar-right">
              <span id="note-counts" class="note-counts" aria-live="polite">0 words · 0 chars</span>
              <button id="export-btn" class="export-btn" type="button">Export TXT</button>
              <div id="view-toggle" class="view-toggle" role="group" aria-label="View mode">
                <button type="button" class="view-opt active" data-view-value="edit">Edit</button>
                <button type="button" class="view-opt" data-view-value="preview">Preview</button>
              </div>
            </div>
          </div>
          <div id="monaco-container"></div>
          <article id="markdown-preview" class="markdown-preview" hidden></article>
        </main>
      </div>

      <!-- Full-document plain-text mirror. Kept in the DOM at all times (so tab
           content readers see the whole document even though Monaco only renders
           visible lines), but visually hidden — the user never sees it.
           Always holds raw Markdown source (never rendered HTML). -->
      <pre id="full-text-mirror" class="visually-hidden"></pre>

      <a
        id="privacy-fab"
        class="privacy-fab"
        href="privacy.html"
        title="Privacy Policy"
        aria-label="Privacy Policy"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 3l7 3v6c0 4.5-2.8 7.8-7 9-4.2-1.2-7-4.5-7-9V6l7-3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <script type="module" src="editor.ts"></script>
  </body>
</html>
